basePath: /api/v1
definitions:
  app.Response:
    properties:
      code:
        type: integer
      data: {}
      msg:
        type: string
    type: object
  model.Activity:
    properties:
      content:
        type: string
      create_time:
        description: Creation time
        type: string
      id:
        type: integer
      img:
        description: Image address
        type: string
      status:
        type: integer
      title:
        type: string
      update_time:
        description: Update time
        type: string
    type: object
  model.ActivityQueryRequest:
    properties:
      page_number:
        description: 页码，从零开始
        example: 0
        type: integer
      timestamp:
        description: 时间戳
        example: 0
        type: integer
    type: object
  model.AuthRequest:
    properties:
      user_id:
        description: 用户ID（来自微信小程序）
        example: user123
        type: string
    type: object
  model.DeleteMenuRequest:
    properties:
      id:
        description: 菜品ID
        example: 1
        type: integer
    type: object
  model.Donation:
    properties:
      amount:
        description: 捐款金额（必填）
        example: 100
        type: number
      create_time:
        example: "2025-07-08T10:00:00Z"
        type: string
      donate_time:
        description: 捐款时间（必填）
        example: "2025-07-08T10:00:00Z"
        type: string
      donor_name:
        description: 捐款人昵称（必填）
        example: 善心人士
        type: string
      id:
        example: 1
        type: integer
      is_visible:
        description: 是否显示在榜单：0隐藏，1显示
        example: 1
        type: integer
      message:
        description: 留言
        example: 祝愿净莲阁越来越好
        type: string
      remarks:
        description: 备注
        example: ""
        type: string
      update_time:
        example: "2025-07-08T10:00:00Z"
        type: string
      user_id:
        description: 用户ID（必填）
        example: user123
        type: string
    type: object
  model.DonationCreateRequest:
    properties:
      amount:
        description: 捐款金额
        example: 100
        type: number
      donor_name:
        description: 捐款人昵称
        example: 善心人士
        type: string
      message:
        description: 留言
        example: 祝愿净莲阁越来越好
        type: string
    type: object
  model.DonationQueryRequest:
    properties:
      donor_name:
        description: 捐款人昵称搜索（模糊匹配）
        example: 善心
        type: string
      page_number:
        description: 页码，从零开始
        example: 0
        type: integer
      page_size:
        description: 每页数量
        example: 10
        type: integer
      period:
        description: 时间范围：all全年，first上半年，second下半年
        example: all
        type: string
      sort_by:
        description: 排序方式：time时间，amount金额
        example: time
        type: string
      sort_order:
        description: 排序顺序：desc降序，asc升序
        example: desc
        type: string
      year:
        description: 年份，0表示不限制
        example: 2025
        type: integer
    type: object
  model.DonationStats:
    properties:
      total_amount:
        description: 总捐款金额
        example: 5000
        type: number
      total_count:
        description: 总捐款人次
        example: 50
        type: integer
    type: object
  model.DonationStatsRequest:
    properties:
      period:
        description: 时间范围：all全年，first上半年，second下半年
        example: all
        type: string
      year:
        description: 年份，0表示不限制
        example: 2025
        type: integer
    type: object
  model.Image:
    properties:
      address:
        example: /images/example.jpg
        type: string
      create_time:
        description: Creation time
        type: string
      desc:
        example: A beautiful image
        type: string
      id:
        example: 1
        type: integer
      status:
        description: 'Status: 0 deleted, 1 normal'
        example: 1
        type: integer
      top_pic:
        description: Whether it is a top image
        example: 1
        type: integer
      type:
        description: 'Image type: 0 activity, 1 restaurant introduction'
        example: 0
        type: integer
      update_time:
        description: Update time
        type: string
    type: object
  model.Menu:
    properties:
      create_time:
        description: Creation time
        example: "2012-1-1"
        type: string
      desc:
        example: 美味的菜品
        type: string
      id:
        example: 1
        type: integer
      image_url:
        example: /images/menu.jpg
        type: string
      ingredients:
        example: '{"米", "豆腐"}'
        type: string
      name:
        description: 菜品名称
        example: 紫菜汤
        type: string
      nutrition:
        example: '{"protein": "10g", "carbs": "20g", "fat": "5g"}'
        type: string
      status:
        description: 状态：0 删除，1 正常
        example: 1
        type: integer
      update_time:
        description: Update time
        example: "2012-1-1"
        type: string
    type: object
  model.MenuByIDRequest:
    properties:
      menu_id:
        description: 菜品ID
        example: 1
        type: integer
    type: object
  model.MenuCommentRequest:
    properties:
      comment:
        description: 评论内容
        example: 非常好吃的菜品！
        type: string
      menu_id:
        description: 菜品ID
        example: 1
        type: integer
    type: object
  model.MenuCommentsQueryRequest:
    properties:
      menu_id:
        description: 菜品ID
        example: 1
        type: integer
      page_number:
        description: 页码，从零开始
        example: 0
        type: integer
      page_size:
        description: 每页数量
        example: 10
        type: integer
    type: object
  model.MenuFeedback:
    properties:
      comment:
        example: 非常好吃
        type: string
      create_time:
        description: Creation time
        example: "2012-1-1"
        type: string
      id:
        example: 1
        type: integer
      menu_id:
        description: 菜单 ID
        example: 1
        type: integer
      preference:
        description: 状态：0 默认，1 喜欢，2 不喜欢
        example: 1
        type: integer
      status:
        description: 状态：0 删除，1 正常
        example: 1
        type: integer
      update_time:
        description: Update time
        example: "2012-1-1"
        type: string
      user_id:
        description: "用户\t ID"
        example: user123
        type: string
    type: object
  model.MenuLikeRequest:
    properties:
      menu_id:
        description: 菜品ID
        example: 1
        type: integer
    type: object
  model.MenuQueryRequest:
    properties:
      name:
        description: 菜单名称，支持模糊匹配
        example: 紫菜汤
        type: string
      page_number:
        description: 页码，从零开始
        example: 0
        type: integer
      page_size:
        description: 每页数量
        example: 10
        type: integer
    type: object
  model.MenuWithLikes:
    properties:
      create_time:
        description: Creation time
        example: "2012-1-1"
        type: string
      desc:
        example: 美味的菜品
        type: string
      id:
        example: 1
        type: integer
      image_url:
        example: /images/menu.jpg
        type: string
      ingredients:
        example: '{"米", "豆腐"}'
        type: string
      like_count:
        description: 点赞数
        example: 5
        type: integer
      name:
        description: 菜品名称
        example: 紫菜汤
        type: string
      nutrition:
        example: '{"protein": "10g", "carbs": "20g", "fat": "5g"}'
        type: string
      status:
        description: 状态：0 删除，1 正常
        example: 1
        type: integer
      update_time:
        description: Update time
        example: "2012-1-1"
        type: string
    type: object
host: https://jingliange.com
info:
  contact: {}
  description: This is the backend API for Jingliange.
  termsOfService: TO IMPLEMENT
  title: Jingliange Server API
  version: "1.0"
paths:
  /api/admin/deleteMenuItem:
    delete:
      consumes:
      - application/json
      description: 根据菜品ID删除菜品（软删除，将状态标记为0）
      parameters:
      - description: 删除参数
        in: body
        name: delete
        required: true
        schema:
          $ref: '#/definitions/model.DeleteMenuRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":null}'
          schema:
            $ref: '#/definitions/app.Response'
        "400":
          description: '{"code":400,"msg":"invalid params","data":"Invalid menu ID"}'
          schema:
            $ref: '#/definitions/app.Response'
        "404":
          description: '{"code":404,"msg":"not found","data":"Menu item not found"}'
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/app.Response'
      summary: 删除菜品
      tags:
      - Menu
  /api/admin/uploadMenuItem:
    post:
      consumes:
      - application/json
      description: 提供菜品的名称、图片url、简介、营养价值表、主要成分，上传到数据库。营养价值表和主要成分需要以JSON字符串格式提供。
      parameters:
      - description: 菜品信息
        in: body
        name: menu
        required: true
        schema:
          $ref: '#/definitions/model.Menu'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":{"id":1,"name":"豆腐汤","image_url":"/images/tofusoup.jpg","desc":"清淡营养的素食汤品，豆腐嫩滑，口感清香，富含植物蛋白","nutrition":"...","ingredients":"...","status":1}}'
          schema:
            $ref: '#/definitions/app.Response'
        "400":
          description: '{"code":400,"msg":"invalid params","data":"All fields are
            required"}'
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/app.Response'
      summary: 上传菜品
      tags:
      - Menu
  /api/v1/about/getActivityList:
    post:
      consumes:
      - application/json
      description: 获取净莲阁的活动列表，支持时间戳过滤和分页
      parameters:
      - description: 查询参数
        in: body
        name: query
        required: true
        schema:
          $ref: '#/definitions/model.ActivityQueryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":[{"id":1,"title":"素食文化活动","content":"介绍素食文化","img":"/images/activity1.jpg","status":1}]}'
          schema:
            allOf:
            - $ref: '#/definitions/app.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.Activity'
                  type: array
              type: object
        "400":
          description: '{"code":400,"msg":"invalid params","data":"Invalid input data"}'
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/app.Response'
      summary: 获取活动列表
      tags:
      - About
  /api/v1/about/getDescription:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.Response'
      summary: 获取净莲阁介绍
      tags:
      - About
  /api/v1/about/getTopImage:
    get:
      description: 获取净莲阁的头图。返回图片地址、简介、是否为头图等信息。
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回头图信息
          schema:
            allOf:
            - $ref: '#/definitions/app.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Image'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.Response'
      summary: 获取头图
      tags:
      - About
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 简单的用户认证，基于微信小程序的用户ID，返回JWT token
      parameters:
      - description: 认证参数
        in: body
        name: auth
        required: true
        schema:
          $ref: '#/definitions/model.AuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":{"token":"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...","user_id":"user123"}}'
          schema:
            allOf:
            - $ref: '#/definitions/app.Response'
            - properties:
                data:
                  additionalProperties: true
                  type: object
              type: object
        "400":
          description: '{"code":400,"msg":"invalid params","data":"Invalid input data"}'
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/app.Response'
      summary: 用户认证
      tags:
      - Auth
  /api/v1/donation/createDonation:
    post:
      consumes:
      - application/json
      description: 用户支付成功后创建捐款记录（需要JWT认证）
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 捐款信息
        in: body
        name: donation
        required: true
        schema:
          $ref: '#/definitions/model.DonationCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":"Donation created successfully"}'
          schema:
            $ref: '#/definitions/app.Response'
        "400":
          description: '{"code":400,"msg":"invalid params","data":"Invalid input data"}'
          schema:
            $ref: '#/definitions/app.Response'
        "401":
          description: '{"code":401,"msg":"unauthorized","data":"Token required"}'
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/app.Response'
      security:
      - ApiKeyAuth: []
      summary: 创建捐款记录
      tags:
      - Donation
  /api/v1/donation/getDonationList:
    post:
      consumes:
      - application/json
      description: 获取捐款记录列表，支持年份、时间段、昵称筛选，支持按时间或金额排序，支持分页
      parameters:
      - description: 查询参数
        in: body
        name: query
        required: true
        schema:
          $ref: '#/definitions/model.DonationQueryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":[{"id":1,"user_id":"user123","donor_name":"善心人士","amount":100.00,"donate_time":"2025-07-08T10:00:00Z","is_visible":1,"message":"祝愿净莲阁越来越好"}]}'
          schema:
            allOf:
            - $ref: '#/definitions/app.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.Donation'
                  type: array
              type: object
        "400":
          description: '{"code":400,"msg":"invalid params","data":"Invalid input data"}'
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/app.Response'
      summary: 获取功德榜列表
      tags:
      - Donation
  /api/v1/donation/getDonationStats:
    post:
      consumes:
      - application/json
      description: 获取指定时间段的捐款统计信息，包括总金额和总人次
      parameters:
      - description: 统计参数
        in: body
        name: stats
        required: true
        schema:
          $ref: '#/definitions/model.DonationStatsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":{"total_amount":5000.00,"total_count":50}}'
          schema:
            allOf:
            - $ref: '#/definitions/app.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.DonationStats'
              type: object
        "400":
          description: '{"code":400,"msg":"invalid params","data":"Invalid input data"}'
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/app.Response'
      summary: 获取捐款统计
      tags:
      - Donation
  /api/v1/getImageList:
    post:
      description: 获取净莲阁的图片列表。返回图片地址、简介、是否为头图等信息。类型为 0 表示活动图片，1 表示餐厅介绍图片。top_pic 为
        1 表示头图，0 表示非头图。
      parameters:
      - default: 0
        description: 图片类型：0 活动，1 餐厅介绍
        in: query
        name: type
        type: integer
      - default: 0
        description: 是否为头图：0 否，1 是
        in: query
        name: top_pic
        type: integer
      - default: 0
        description: 页码, 从零开始
        in: query
        name: pageNumber
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回图片列表
          schema:
            allOf:
            - $ref: '#/definitions/app.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.Image'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.Response'
      summary: 获取图片列表
  /api/v1/menu/comment:
    post:
      consumes:
      - application/json
      description: 用户对菜品进行评论（需要JWT认证）
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 评论参数
        in: body
        name: comment
        required: true
        schema:
          $ref: '#/definitions/model.MenuCommentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":"comment added successfully"}'
          schema:
            $ref: '#/definitions/app.Response'
        "400":
          description: '{"code":400,"msg":"invalid params","data":"Invalid input data"}'
          schema:
            $ref: '#/definitions/app.Response'
        "401":
          description: '{"code":401,"msg":"unauthorized","data":"Token required"}'
          schema:
            $ref: '#/definitions/app.Response'
        "404":
          description: '{"code":404,"msg":"not found","data":"Menu item not found"}'
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/app.Response'
      security:
      - ApiKeyAuth: []
      summary: 菜品评论
      tags:
      - Menu
  /api/v1/menu/getComments:
    post:
      consumes:
      - application/json
      description: 获取指定菜品的评论列表，支持分页
      parameters:
      - description: 查询参数
        in: body
        name: query
        required: true
        schema:
          $ref: '#/definitions/model.MenuCommentsQueryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":[{"id":1,"menu_id":1,"user_id":"user123","preference":1,"comment":"非常好吃！","status":1}]}'
          schema:
            allOf:
            - $ref: '#/definitions/app.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.MenuFeedback'
                  type: array
              type: object
        "400":
          description: '{"code":400,"msg":"invalid params","data":"Invalid input data"}'
          schema:
            $ref: '#/definitions/app.Response'
        "404":
          description: '{"code":404,"msg":"not found","data":"Menu item not found"}'
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/app.Response'
      summary: 获取菜品评论列表
      tags:
      - Menu
  /api/v1/menu/getLikeStatus:
    post:
      consumes:
      - application/json
      description: 获取用户对特定菜品的点赞状态（需要JWT认证）
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 查询参数
        in: body
        name: status
        required: true
        schema:
          $ref: '#/definitions/model.MenuLikeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":{"liked":true,"preference":1}}'
          schema:
            $ref: '#/definitions/app.Response'
        "400":
          description: '{"code":400,"msg":"invalid params","data":"Invalid input data"}'
          schema:
            $ref: '#/definitions/app.Response'
        "401":
          description: '{"code":401,"msg":"unauthorized","data":"Token required"}'
          schema:
            $ref: '#/definitions/app.Response'
        "404":
          description: '{"code":404,"msg":"not found","data":"Menu item not found"}'
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/app.Response'
      security:
      - ApiKeyAuth: []
      summary: 获取菜品点赞状态
      tags:
      - Menu
  /api/v1/menu/getMenu:
    post:
      consumes:
      - application/json
      description: 获取全部净莲阁菜单，返回菜单项列表，每个菜单项包含名称、图片 url、营养价值表 json、点赞数等信息。输入名称过滤菜单项，支持模糊匹配。
      parameters:
      - description: 查询参数
        in: body
        name: query
        required: true
        schema:
