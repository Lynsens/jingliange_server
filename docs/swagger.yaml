basePath: /api/v1
definitions:
  github_com_lynsens_jingliange_server_internal_model.Activity:
    properties:
      content:
        type: string
      create_time:
        description: Creation time
        type: string
      id:
        type: integer
      img:
        description: Image address
        type: string
      status:
        type: integer
      title:
        type: string
      update_time:
        description: Update time
        type: string
    type: object
  github_com_lynsens_jingliange_server_internal_model.ActivityQueryRequest:
    properties:
      page_number:
        description: 页码，从零开始
        example: 0
        type: integer
      timestamp:
        description: 时间戳
        example: 0
        type: integer
    type: object
  github_com_lynsens_jingliange_server_internal_model.DeleteMenuRequest:
    properties:
      id:
        description: 菜品ID
        example: 1
        type: integer
    type: object
  github_com_lynsens_jingliange_server_internal_model.Image:
    properties:
      address:
        example: /images/example.jpg
        type: string
      create_time:
        description: Creation time
        type: string
      desc:
        example: A beautiful image
        type: string
      id:
        example: 1
        type: integer
      status:
        description: 'Status: 0 deleted, 1 normal'
        example: 1
        type: integer
      top_pic:
        description: Whether it is a top image
        example: 1
        type: integer
      type:
        description: 'Image type: 0 activity, 1 restaurant introduction'
        example: 0
        type: integer
      update_time:
        description: Update time
        type: string
    type: object
  github_com_lynsens_jingliange_server_internal_model.Menu:
    properties:
      create_time:
        description: Creation time
        example: "2012-1-1"
        type: string
      desc:
        example: 美味的菜品
        type: string
      id:
        example: 1
        type: integer
      image_url:
        example: /images/menu.jpg
        type: string
      ingredients:
        example: '{"米", "豆腐"}'
        type: string
      name:
        description: 菜品名称
        example: 紫菜汤
        type: string
      nutrition:
        example: '{"protein": "10g", "carbs": "20g", "fat": "5g"}'
        type: string
      status:
        description: 状态：0 删除，1 正常
        example: 1
        type: integer
      update_time:
        description: Update time
        example: "2012-1-1"
        type: string
    type: object
  github_com_lynsens_jingliange_server_internal_model.MenuByIDRequest:
    properties:
      menu_id:
        description: 菜品ID
        example: 1
        type: integer
    type: object
  github_com_lynsens_jingliange_server_internal_model.MenuCommentRequest:
    properties:
      comment:
        description: 评论内容
        example: 非常好吃的菜品！
        type: string
      menu_id:
        description: 菜品ID
        example: 1
        type: integer
      user_id:
        description: 用户ID
        example: user123
        type: string
    type: object
  github_com_lynsens_jingliange_server_internal_model.MenuCommentsQueryRequest:
    properties:
      menu_id:
        description: 菜品ID
        example: 1
        type: integer
      page_number:
        description: 页码，从零开始
        example: 0
        type: integer
      page_size:
        description: 每页数量
        example: 10
        type: integer
    type: object
  github_com_lynsens_jingliange_server_internal_model.MenuFeedback:
    properties:
      comment:
        example: 非常好吃
        type: string
      create_time:
        description: Creation time
        example: "2012-1-1"
        type: string
      id:
        example: 1
        type: integer
      menu_id:
        description: 菜单 ID
        example: 1
        type: integer
      preference:
        description: 状态：0 默认，1 喜欢，2 不喜欢
        example: 1
        type: integer
      status:
        description: 状态：0 删除，1 正常
        example: 1
        type: integer
      update_time:
        description: Update time
        example: "2012-1-1"
        type: string
      user_id:
        description: "用户\t ID"
        example: user123
        type: string
    type: object
  github_com_lynsens_jingliange_server_internal_model.MenuLikeRequest:
    properties:
      menu_id:
        description: 菜品ID
        example: 1
        type: integer
      user_id:
        description: 用户ID
        example: user123
        type: string
    type: object
  github_com_lynsens_jingliange_server_internal_model.MenuQueryRequest:
    properties:
      name:
        description: 菜单名称，支持模糊匹配
        example: 紫菜汤
        type: string
      page_number:
        description: 页码，从零开始
        example: 0
        type: integer
      page_size:
        description: 每页数量
        example: 10
        type: integer
    type: object
  github_com_lynsens_jingliange_server_internal_model.MenuWithLikes:
    properties:
      create_time:
        description: Creation time
        example: "2012-1-1"
        type: string
      desc:
        example: 美味的菜品
        type: string
      id:
        example: 1
        type: integer
      image_url:
        example: /images/menu.jpg
        type: string
      ingredients:
        example: '{"米", "豆腐"}'
        type: string
      like_count:
        description: 点赞数
        example: 5
        type: integer
      name:
        description: 菜品名称
        example: 紫菜汤
        type: string
      nutrition:
        example: '{"protein": "10g", "carbs": "20g", "fat": "5g"}'
        type: string
      status:
        description: 状态：0 删除，1 正常
        example: 1
        type: integer
      update_time:
        description: Update time
        example: "2012-1-1"
        type: string
    type: object
  github_com_lynsens_jingliange_server_pkg_app.Response:
    properties:
      code:
        type: integer
      data: {}
      msg:
        type: string
    type: object
host: https://jingliange.com
info:
  contact: {}
  description: This is the backend API for Jingliange.
  termsOfService: TO IMPLEMENT
  title: Jingliange Server API
  version: "1.0"
paths:
  /api/admin/deleteMenuItem:
    delete:
      consumes:
      - application/json
      description: 根据菜品ID删除菜品（软删除，将状态标记为0）
      parameters:
      - description: 删除参数
        in: body
        name: delete
        required: true
        schema:
          $ref: '#/definitions/github_com_lynsens_jingliange_server_internal_model.DeleteMenuRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":null}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "400":
          description: '{"code":400,"msg":"invalid params","data":"Invalid menu ID"}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "404":
          description: '{"code":404,"msg":"not found","data":"Menu item not found"}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
      summary: 删除菜品
      tags:
      - Menu
  /api/admin/uploadMenuItem:
    post:
      consumes:
      - application/json
      description: 提供菜品的名称、图片url、简介、营养价值表、主要成分，上传到数据库。营养价值表和主要成分需要以JSON字符串格式提供。
      parameters:
      - description: 菜品信息
        in: body
        name: menu
        required: true
        schema:
          $ref: '#/definitions/github_com_lynsens_jingliange_server_internal_model.Menu'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":{"id":1,"name":"豆腐汤","image_url":"/images/tofusoup.jpg","desc":"清淡营养的素食汤品，豆腐嫩滑，口感清香，富含植物蛋白","nutrition":"...","ingredients":"...","status":1}}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "400":
          description: '{"code":400,"msg":"invalid params","data":"All fields are
            required"}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
      summary: 上传菜品
      tags:
      - Menu
  /api/v1/about/getActivityList:
    post:
      consumes:
      - application/json
      description: 获取净莲阁的活动列表，支持时间戳过滤和分页
      parameters:
      - description: 查询参数
        in: body
        name: query
        required: true
        schema:
          $ref: '#/definitions/github_com_lynsens_jingliange_server_internal_model.ActivityQueryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":[{"id":1,"title":"素食文化活动","content":"介绍素食文化","img":"/images/activity1.jpg","status":1}]}'
          schema:
            allOf:
            - $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_lynsens_jingliange_server_internal_model.Activity'
                  type: array
              type: object
        "400":
          description: '{"code":400,"msg":"invalid params","data":"Invalid input data"}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
      summary: 获取活动列表
      tags:
      - About
  /api/v1/about/getDescription:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
      summary: 获取净莲阁介绍
      tags:
      - About
  /api/v1/about/getTopImage:
    get:
      description: 获取净莲阁的头图。返回图片地址、简介、是否为头图等信息。
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回头图信息
          schema:
            allOf:
            - $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_lynsens_jingliange_server_internal_model.Image'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
      summary: 获取头图
      tags:
      - About
  /api/v1/getImageList:
    post:
      description: 获取净莲阁的图片列表。返回图片地址、简介、是否为头图等信息。类型为 0 表示活动图片，1 表示餐厅介绍图片。top_pic 为
        1 表示头图，0 表示非头图。
      parameters:
      - default: 0
        description: 图片类型：0 活动，1 餐厅介绍
        in: query
        name: type
        type: integer
      - default: 0
        description: 是否为头图：0 否，1 是
        in: query
        name: top_pic
        type: integer
      - default: 0
        description: 页码, 从零开始
        in: query
        name: pageNumber
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回图片列表
          schema:
            allOf:
            - $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_lynsens_jingliange_server_internal_model.Image'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
      summary: 获取图片列表
  /api/v1/menu/comment:
    post:
      consumes:
      - application/json
      description: 用户对菜品进行评论
      parameters:
      - description: 评论参数
        in: body
        name: comment
        required: true
        schema:
          $ref: '#/definitions/github_com_lynsens_jingliange_server_internal_model.MenuCommentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":"comment added successfully"}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "400":
          description: '{"code":400,"msg":"invalid params","data":"Invalid input data"}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "404":
          description: '{"code":404,"msg":"not found","data":"Menu item not found"}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
      summary: 菜品评论
      tags:
      - Menu
  /api/v1/menu/getComments:
    post:
      consumes:
      - application/json
      description: 获取指定菜品的评论列表，支持分页
      parameters:
      - description: 查询参数
        in: body
        name: query
        required: true
        schema:
          $ref: '#/definitions/github_com_lynsens_jingliange_server_internal_model.MenuCommentsQueryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":[{"id":1,"menu_id":1,"user_id":"user123","preference":1,"comment":"非常好吃！","status":1}]}'
          schema:
            allOf:
            - $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_lynsens_jingliange_server_internal_model.MenuFeedback'
                  type: array
              type: object
        "400":
          description: '{"code":400,"msg":"invalid params","data":"Invalid input data"}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "404":
          description: '{"code":404,"msg":"not found","data":"Menu item not found"}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
      summary: 获取菜品评论列表
      tags:
      - Menu
  /api/v1/menu/getLikeStatus:
    post:
      consumes:
      - application/json
      description: 获取用户对特定菜品的点赞状态
      parameters:
      - description: 查询参数
        in: body
        name: status
        required: true
        schema:
          $ref: '#/definitions/github_com_lynsens_jingliange_server_internal_model.MenuLikeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":{"liked":true,"preference":1}}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "400":
          description: '{"code":400,"msg":"invalid params","data":"Invalid input data"}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "404":
          description: '{"code":404,"msg":"not found","data":"Menu item not found"}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
      summary: 获取菜品点赞状态
      tags:
      - Menu
  /api/v1/menu/getMenu:
    post:
      consumes:
      - application/json
      description: 获取全部净莲阁菜单，返回菜单项列表，每个菜单项包含名称、图片 url、营养价值表 json、点赞数等信息。输入名称过滤菜单项，支持模糊匹配。
      parameters:
      - description: 查询参数
        in: body
        name: query
        required: true
        schema:
          $ref: '#/definitions/github_com_lynsens_jingliange_server_internal_model.MenuQueryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":[{"id":1,"name":"紫菜汤","image_url":"/images/menu.jpg","desc":"美味的菜品","nutrition":"...","ingredients":"...","status":1,"like_count":5}]}'
          schema:
            allOf:
            - $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_lynsens_jingliange_server_internal_model.MenuWithLikes'
                  type: array
              type: object
        "400":
          description: '{"code":400,"msg":"invalid params","data":"Invalid input data"}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
      summary: 获取净莲阁的菜单
      tags:
      - Menu
  /api/v1/menu/getMenuByID:
    post:
      consumes:
      - application/json
      description: 根据菜品ID获取单个菜品的详细信息，包括点赞数
      parameters:
      - description: 查询参数
        in: body
        name: query
        required: true
        schema:
          $ref: '#/definitions/github_com_lynsens_jingliange_server_internal_model.MenuByIDRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":{"id":1,"name":"紫菜汤","image_url":"/images/menu.jpg","desc":"美味的菜品","nutrition":"...","ingredients":"...","status":1,"like_count":5,"create_time":"2012-1-1","update_time":"2012-1-1"}}'
          schema:
            allOf:
            - $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_lynsens_jingliange_server_internal_model.MenuWithLikes'
              type: object
        "400":
          description: '{"code":400,"msg":"invalid params","data":"Invalid input data"}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "404":
          description: '{"code":404,"msg":"not found","data":"Menu item not found"}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
      summary: 获取单个菜品信息
      tags:
      - Menu
  /api/v1/menu/like:
    post:
      consumes:
      - application/json
      description: 用户为喜欢的菜品点赞或取消点赞
      parameters:
      - description: 点赞参数
        in: body
        name: like
        required: true
        schema:
          $ref: '#/definitions/github_com_lynsens_jingliange_server_internal_model.MenuLikeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":"liked successfully"}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "400":
          description: '{"code":400,"msg":"invalid params","data":"Invalid input data"}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "404":
          description: '{"code":404,"msg":"not found","data":"Menu item not found"}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
      summary: 菜品点赞
      tags:
      - Menu
  /api/v1/uploadImage:
    post:
      description: 上传净莲阁的图片。支持图片格式检查和大小限制，返回图片的访问地址、保存路径和文件名。
      parameters:
      - description: 图片文件
        in: formData
        name: image
        required: true
        type: file
      - description: 图片描述
        in: formData
        name: desc
        type: string
      - description: 是否为头图：0 否，1 是
        in: formData
        name: top_pic
        required: true
        type: integer
      - description: 图片类型：0 活动，1 餐厅介绍
        in: formData
        name: type
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            allOf:
            - $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/github_com_lynsens_jingliange_server_pkg_app.Response'
      summary: 上传图片
