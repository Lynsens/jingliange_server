basePath: /api/v1
definitions:
  app.Response:
    properties:
      code:
        type: integer
      data: {}
      msg:
        type: string
    type: object
  model.Image:
    properties:
      address:
        example: /images/example.jpg
        type: string
      createTime:
        description: Creation time
        type: string
      desc:
        example: A beautiful image
        type: string
      id:
        example: 1
        type: integer
      status:
        description: 'Status: 0 deleted, 1 normal'
        example: 1
        type: integer
      top_pic:
        description: Whether it is a top image
        example: 1
        type: integer
      type:
        description: 'Image type: 0 activity, 1 restaurant introduction'
        example: 0
        type: integer
      updateTime:
        description: Update time
        type: string
    type: object
  model.Menu:
    properties:
      createTime:
        description: Creation time
        example: "2012-1-1"
        type: string
      desc:
        example: 美味的菜品
        type: string
      id:
        example: 1
        type: integer
      image_url:
        example: /images/menu.jpg
        type: string
      ingredients:
        example: '{"米", "豆腐"}'
        type: string
      name:
        description: 菜品名称
        example: 紫菜汤
        type: string
      nutrition:
        example: '{"protein": "10g", "carbs": "20g", "fat": "5g"}'
        type: string
      status:
        description: 状态：0 删除，1 正常
        example: 1
        type: integer
      updateTime:
        description: Update time
        example: "2012-1-1"
        type: string
    type: object
host: https://jingliange.com
info:
  contact: {}
  description: This is the backend API for Jingliange.
  termsOfService: TO IMPLEMENT
  title: Jingliange Server API
  version: "1.0"
paths:
  /api/admin/deleteMenuItem/{id}:
    delete:
      description: 根据菜品ID删除菜品（软删除，将状态标记为0）
      parameters:
      - description: 菜品ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":null}'
          schema:
            $ref: '#/definitions/app.Response'
        "400":
          description: '{"code":400,"msg":"invalid params","data":"Invalid menu ID"}'
          schema:
            $ref: '#/definitions/app.Response'
        "404":
          description: '{"code":404,"msg":"not found","data":"Menu item not found"}'
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/app.Response'
      summary: 删除菜品
      tags:
      - Menu
  /api/admin/uploadMenuItem:
    post:
      consumes:
      - application/json
      description: 提供菜品的名称、图片url、简介、营养价值表、主要成分，上传到数据库。营养价值表和主要成分需要以JSON字符串格式提供。
      parameters:
      - description: 菜品信息
        in: body
        name: menu
        required: true
        schema:
          $ref: '#/definitions/model.Menu'
      produces:
      - application/json
      responses:
        "200":
          description: '{"code":200,"msg":"ok","data":{"id":1,"name":"豆腐汤","image_url":"/images/tofusoup.jpg","desc":"清淡营养的素食汤品，豆腐嫩滑，口感清香，富含植物蛋白","nutrition":"...","ingredients":"...","status":1}}'
          schema:
            $ref: '#/definitions/app.Response'
        "400":
          description: '{"code":400,"msg":"invalid params","data":"All fields are
            required"}'
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: '{"code":500,"msg":"internal server error","data":null}'
          schema:
            $ref: '#/definitions/app.Response'
      summary: 上传菜品
      tags:
      - Menu
  /api/v1/about/getActivityList:
    post:
      description: 获取净莲阁的活动列表，输入时间戳
      parameters:
      - default: "0"
        description: 时间戳
        in: query
        name: timestamp
        required: true
        type: string
      - default: "0"
        description: 页码, 从零开始
        in: query
        name: pageNumber
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.Response'
      summary: 获取活动列表
      tags:
      - About
  /api/v1/about/getDescription:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.Response'
      summary: 获取净莲阁介绍
      tags:
      - About
  /api/v1/about/getTopImage:
    get:
      description: 获取净莲阁的头图。返回图片地址、简介、是否为头图等信息。
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回头图信息
          schema:
            allOf:
            - $ref: '#/definitions/app.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Image'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.Response'
      summary: 获取头图
      tags:
      - About
  /api/v1/getImageList:
    post:
      description: 获取净莲阁的图片列表。返回图片地址、简介、是否为头图等信息。类型为 0 表示活动图片，1 表示餐厅介绍图片。top_pic 为
        1 表示头图，0 表示非头图。
      parameters:
      - default: 0
        description: 图片类型：0 活动，1 餐厅介绍
        in: query
        name: type
        type: integer
      - default: 0
        description: 是否为头图：0 否，1 是
        in: query
        name: top_pic
        type: integer
      - default: 0
        description: 页码, 从零开始
        in: query
        name: pageNumber
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回图片列表
          schema:
            allOf:
            - $ref: '#/definitions/app.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.Image'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.Response'
      summary: 获取图片列表
  /api/v1/menu/getMenu:
    post:
      description: 获取全部净莲阁菜单，返回菜单项列表，每个菜单项包含名称、图片 url、营养价值表 json等信息。输入名称过滤菜单项，支持模糊匹配。
      parameters:
      - default: '""'
        description: 菜单名称，支持模糊匹配
        in: query
        name: name
        type: string
      - default: "10"
        description: 每页数量
        in: query
        name: pageSize
        type: string
      - default: "0"
        description: 页码, 从零开始
        in: query
        name: pageNumber
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/app.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Menu'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.Response'
      summary: 获取净莲阁的菜单
      tags:
      - Menu
  /api/v1/uploadImage:
    post:
      description: 上传净莲阁的图片。支持图片格式检查和大小限制，返回图片的访问地址、保存路径和文件名。
      parameters:
      - description: 图片文件
        in: formData
        name: image
        required: true
        type: file
      - description: 图片描述
        in: formData
        name: desc
        type: string
      - description: 是否为头图：0 否，1 是
        in: formData
        name: top_pic
        required: true
        type: integer
      - description: 图片类型：0 活动，1 餐厅介绍
        in: formData
        name: type
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            allOf:
            - $ref: '#/definitions/app.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/app.Response'
      summary: 上传图片
schemes:
- http
swagger: "2.0"
