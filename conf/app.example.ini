[app]
PageSize = 10
JwtSecret = <change-me>
JwtExpire = 720
PrefixUrl = http://localhost:8000

RuntimeRootPath = runtime/

ImageSavePath = uploads/images/
ImageMaxSize = 2048
ImageAllowExts = .jpg,.jpeg,.png

LogSavePath = logs/
LogSaveName = log
LogFileExt = log
TimeFormat = 20060102

[server]
# debug or release
RunMode = debug
HttpPort = 8000
ReadTimeout = 60
WriteTimeout = 60

[database]
Type = mysql
User = <database-user>
Password = <database-password>
Host = 127.0.0.1:3306
Name = jlg
TablePrefix = jlg_

[admin]
Username = admin
PasswordHash = <bcrypt-admin-password-hash>

[ops]
NginxAccessLogPath = /var/log/nginx/jingliange.com_access.log
NginxErrorLogPath = /var/log/nginx/jingliange.com_error.log
AppLogDir = runtime/logs/
