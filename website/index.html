<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="净莲阁素食馆，素食、文化、净心。">
    <title>净莲阁素食馆</title>
    <style>
        :root {
            --ink: #15100d;
            --brown: #ad6b3d;
            --brown-dark: #7a4f36;
            --paper: #fffaf5;
            --warm: #f7eadc;
            --line: #eadbcf;
            --muted: #7d6656;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            color: var(--ink);
            background: var(--warm);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
            line-height: 1.65;
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 48px 18px 28px;
        }

        .main {
            width: min(880px, 100%);
            margin: 0 auto;
            flex: 1;
        }

        .hero {
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: clamp(28px, 6vw, 64px);
            box-shadow: 0 12px 30px rgba(122, 79, 54, 0.08);
        }

        .hero-top {
            display: grid;
            grid-template-columns: minmax(0, 1fr) min(28vw, 180px);
            gap: clamp(20px, 5vw, 48px);
            align-items: center;
        }

        .logo {
            width: 100%;
            max-width: 180px;
            aspect-ratio: 1 / 1;
            justify-self: end;
            border-radius: 14px;
            object-fit: cover;
            box-shadow: 0 10px 24px rgba(122, 79, 54, 0.12);
        }

        .eyebrow {
            margin: 0 0 18px;
            color: var(--brown-dark);
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0;
        }

        h1 {
            margin: 0;
            font-family: "STKaiti", "KaiTi", "Kaiti SC", "Songti SC", serif;
            font-size: clamp(54px, 13vw, 104px);
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: 0;
        }

        .tagline {
            margin: 18px 0 0;
            color: var(--ink);
            font-size: clamp(24px, 5vw, 44px);
            font-weight: 700;
            letter-spacing: 0;
        }

        .intro {
            max-width: 620px;
            margin: 22px 0 0;
            color: var(--muted);
            font-size: clamp(16px, 2.5vw, 19px);
        }

        .details {
            display: grid;
            grid-template-columns: 0.8fr 1.2fr;
            gap: 14px;
            margin-top: 24px;
        }

        .detail {
            min-height: 112px;
            padding: 18px;
            background: #fff5ed;
            border: 1px solid #f0dfd1;
            border-radius: 14px;
        }

        .detail-label {
            margin: 0 0 6px;
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
        }

        .detail-value {
            margin: 0;
            color: var(--ink);
            font-size: 20px;
            font-weight: 650;
            line-height: 1.45;
        }

        .note {
            margin-top: 22px;
            padding-top: 20px;
            border-top: 1px solid var(--line);
            color: var(--muted);
            font-size: 15px;
        }

        .footer {
            width: min(880px, 100%);
            margin: 22px auto 0;
            color: var(--muted);
            font-size: 13px;
            text-align: center;
        }

        .footer p {
            margin: 5px 0;
        }

        .footer a {
            color: var(--brown-dark);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 680px) {
            .page {
                padding-top: 28px;
            }

            .hero {
                border-radius: 16px;
            }

            .hero-top {
                grid-template-columns: 1fr;
            }

            .logo {
                width: 160px;
                max-width: 48vw;
                justify-self: start;
                order: -1;
            }

            .details {
                grid-template-columns: 1fr;
            }

            .detail {
                min-height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <main class="main">
            <section class="hero" aria-label="净莲阁简介">
                <div class="hero-top">
                    <div>
                        <p class="eyebrow">净莲阁素食馆</p>
                        <h1>净莲阁</h1>
                        <p class="tagline">素食 · 文化 · 净心</p>
                        <p class="intro">以清淡、均衡、当季的素食料理，留一处安静用餐与相聚的空间。</p>
                    </div>
                    <img class="logo" src="/assets/jingliange-logo.jpg" alt="净莲阁 logo">
                </div>

                <div class="details">
                    <div class="detail">
                        <p class="detail-label">开放时间</p>
                        <p class="detail-value">11:00 - 13:00</p>
                    </div>
                    <div class="detail">
                        <p class="detail-label">地址</p>
                        <p class="detail-value">温州市瓯海区茶山大学城高科路 103 号</p>
                    </div>
                </div>

                <p class="note">更多菜单、近期活动与内容管理功能，请在净莲阁微信小程序中查看。</p>
            </section>
        </main>

        <footer class="footer">
            <p>温州净莲阁素食馆有限公司</p>
            <p><a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">浙ICP备2025186109号-1</a></p>
        </footer>
    </div>
</body>
</html>
